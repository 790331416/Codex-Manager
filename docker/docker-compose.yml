services:
  codexmanager-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.service
    restart: unless-stopped
    environment:
      CODEXMANAGER_SERVICE_ADDR: 0.0.0.0:45760
      CODEXMANAGER_DB_PATH: /data/codexmanager.db
      CODEXMANAGER_RPC_TOKEN_FILE: /data/codexmanager.rpc-token
    volumes:
      - codexmanager-data:/data
    ports:
      - "45760:45760"

  codexmanager-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    depends_on:
      codexmanager-service:
        condition: service_healthy
    environment:
      CODEXMANAGER_WEB_ADDR: 0.0.0.0:45761
      CODEXMANAGER_WEB_NO_SPAWN_SERVICE: "1"
      CODEXMANAGER_SERVICE_ADDR: codexmanager-service:45760
      CODEXMANAGER_DB_PATH: /data/codexmanager.db
      CODEXMANAGER_RPC_TOKEN_FILE: /data/codexmanager.rpc-token
      CODEXMANAGER_WEB_NO_OPEN: "1"
    volumes:
      - codexmanager-data:/data
    ports:
      - "45761:45761"

volumes:
  codexmanager-data:
